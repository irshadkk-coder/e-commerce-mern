services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: shopping
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: shopping
      FRONTEND_URL: http://localhost
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_secret}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_replace_me}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-replace_me}
      RATE_LIMIT_MAX: 300
      AUTH_RATE_LIMIT_MAX: 20
      PAYMENT_RATE_LIMIT_MAX: 30
      UPLOAD_FILE_SIZE_LIMIT: 2097152
    volumes:
      - product_images:/app/public/product-images
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_ASSET_BASE_URL: ""
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  mongo_data:
  product_images:
