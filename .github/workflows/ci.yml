name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      MONGO_URL: mongodb://127.0.0.1:27017
      DB_NAME: ecommerce_ci_test
      JWT_SECRET: ci_test_jwt_secret_change_for_real_deployments
      RAZORPAY_KEY_ID: rzp_test_ci
      RAZORPAY_KEY_SECRET: ci_razorpay_secret
      FRONTEND_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run check
      - run: npm test

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_BASE_URL: /api
      VITE_ASSET_BASE_URL: ""
      VITE_RAZORPAY_KEY_ID: rzp_test_ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build

  docker:
    name: Docker build verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t ecommerce-backend:ci ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=/api \
            --build-arg VITE_RAZORPAY_KEY_ID=rzp_test_ci \
            -t ecommerce-frontend:ci ./frontend
